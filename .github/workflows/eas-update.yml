name: EAS Update (OTA)
on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch"
        required: true
        default: "production"
        type: choice
        options: [preview, production, development]
      message:
        description: "Update message"
        required: true
        default: "OTA update"
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - run: |
          if [ -z "${{ secrets.EXPO_TOKEN }}" ]; then echo "::error::Add EXPO_TOKEN"; exit 1; fi
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm install --no-audit --no-fund
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - run: eas update --branch ${{ github.event.inputs.branch }} --message "${{ github.event.inputs.message }}" --non-interactive
