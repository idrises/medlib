name: EAS Build
on:
  workflow_dispatch:
    inputs:
      profile: { type: choice, options: [preview, production], default: preview, required: true }
      platform: { type: choice, options: [ios, android, all], default: ios, required: true }
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm install --no-audit --no-fund
      - uses: expo/expo-github-action@v8
        with: { eas-version: latest, token: ${{ secrets.EXPO_TOKEN }} }
      - run: eas build --profile ${{ github.event.inputs.profile }} --platform ${{ github.event.inputs.platform }} --non-interactive --no-wait
