kind = "mobile"
previewPath = "/"
title = "MedLib - Medical Library"
version = "1.0.0"
id = "artifacts/medlib"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
name = "expo"
paths = [ "/" ]
localPort = 18449

[services.development]
run = "pnpm --filter @workspace/medlib run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/medlib", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/medlib", "run", "serve" ]

[services.env]
PORT = "18449"
BASE_PATH = "/"
